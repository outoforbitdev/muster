name: Release

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: '1.26.5'

      - name: Extract version and release notes from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 '## \[[0-9]*\.[0-9]*\.[0-9]*' CHANGELOG.md | sed 's/.*\[\([0-9]*\.[0-9]*\.[0-9]*\)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract semantic version from CHANGELOG.md"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

          # Extract release notes for this version from CHANGELOG
          # Captures everything after the version header until the next version or separator
          awk "/## \[$VERSION\]/,/^(## \[|---)/" CHANGELOG.md | \
            sed '1d;$d' | \
            sed '/^$/d' > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Warning: No release notes found for version $VERSION"
            echo "## $VERSION" > release-notes.md
          fi

          echo "Release notes:"
          cat release-notes.md

      - name: Check if tag already exists
        id: check-tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Run GoReleaser
        if: steps.check-tag.outputs.exists == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
