name: OpenSSF Scorecard

permissions:
  security-events: write
  id-token: write

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  scorecard:
    # yamllint disable-line rule:line-length
    uses: outoforbitdev/reusable-workflows-library/.github/workflows/scorecard.yml@main
