version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: ./cmd/muster
    binary: muster
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

release:
  draft: true
  # Auto-detect pre-release based on semver (e.g., 0.1.0-alpha, 1.0.0-rc1)
  prerelease: auto
