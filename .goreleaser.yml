version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: ./cmd/muster
    binary: muster
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    default_libname: muster
    default_binary_name: muster

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

release:
  draft: false
  prerelease: false
